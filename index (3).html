          <div style={{fontWeight:900,fontSize:18,marginBottom:16}}>⬇️ {t.deposit}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
            {DEP.map(a=>(<button key={a} onClick={()=>{setDepAmt(a);setDepCustom("")}} style={{padding:"13px 5px",borderRadius:14,fontFamily:"inherit",fontWeight:800,cursor:"pointer",fontSize:12,border:`1.5px solid ${depAmt===a&&!depCustom?P.blue:P.border}`,background:depAmt===a&&!depCustom?P.lite:"#fff",color:depAmt===a&&!depCustom?P.blue:P.mid}}>{fp(a)}</button>))}
          </div>
          <input style={{...INP,marginBottom:14}} type="number" value={depCustom} onChange={e=>setDepCustom(e.target.value)} placeholder="ወይስ ሌላ (ብር)"/>
          <div style={{marginBottom:18}}>
            <div style={{fontSize:12,fontWeight:800,color:"#475569",marginBottom:8}}>{t.depWith}</div>
            {PAYS.map(p2=>(<button key={p2} onClick={()=>setDepVia(p2)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 15px",borderRadius:14,width:"100%",marginBottom:8,border:`1.5px solid ${depVia===p2?P.blue:P.border}`,background:depVia===p2?P.lite:"#fff",color:depVia===p2?P.blue:P.mid,fontWeight:700,textAlign:"left",cursor:"pointer",fontFamily:"inherit",fontSize:13}}>
              <span style={{fontSize:20}}>{"📱🏦🏛️"[PAYS.indexOf(p2)]}</span>{p2}{depVia===p2&&<span style={{marginLeft:"auto"}}>✓</span>}
            </button>))}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setModal(null)} style={{flex:1,padding:13,background:P.pale,border:"none",borderRadius:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",color:P.mid}}>{t.cancel}</button>
            <button onClick={doDep} style={{flex:2,padding:13,background:`linear-gradient(135deg,${P.grn},#047857)`,color:"#fff",border:"none",borderRadius:14,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>{t.confirmDep}</button>
          </div>
        </div>
      </div>}

      {modal==="withdraw"&&<div style={{position:"fixed",inset:0,background:"rgba(10,22,40,0.65)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}}>
        <div style={{background:"#fff",borderRadius:"30px 30px 0 0",padding:24,width:"100%",maxWidth:480,paddingBottom:34}}>
          <div style={{width:44,height:5,borderRadius:3,background:P.border,margin:"0 auto 22px"}}/>
          <div style={{fontWeight:900,fontSize:18,marginBottom:16}}>⬆️ {t.withdraw}</div>
          <div style={{background:P.goldL,borderRadius:14,padding:"13px 16px",marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span style={{color:P.goldD}}>{t.balance}</span><span style={{fontWeight:900,color:P.goldD}}>{fp(c.wallet)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}><span style={{color:P.goldD}}>ዝቅተኛ ቀሪ</span><span style={{fontWeight:700,color:P.goldD}}>- {fp(MIN_BAL)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:14,borderTop:`1px solid ${P.gold}30`,paddingTop:8}}><span style={{fontWeight:800,color:P.goldD}}>{t.available}</span><span style={{fontWeight:900,color:P.gold}}>{fp(avail)}</span></div>
          </div>
          <input style={{...INP,marginBottom:14}} type="number" value={wdAmt} onChange={e=>setWdAmt(e.target.value)} placeholder={`ፈጥ. ${fp(avail)}`}/>
          <div style={{marginBottom:16}}>
            {PAYS.map(p2=>(<button key={p2} onClick={()=>setWdVia(p2)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 15px",borderRadius:14,width:"100%",marginBottom:8,border:`1.5px solid ${wdVia===p2?P.blue:P.border}`,background:wdVia===p2?P.lite:"#fff",color:wdVia===p2?P.blue:P.mid,fontWeight:700,textAlign:"left",cursor:"pointer",fontFamily:"inherit",fontSize:13}}>
              <span style={{fontSize:20}}>{"📱🏦🏛️"[PAYS.indexOf(p2)]}</span>{p2}{wdVia===p2&&<span style={{marginLeft:"auto"}}>✓</span>}
            </button>))}
          </div>
          {wdAmt&&Number(wdAmt)>avail&&<div style={{background:P.redL,borderRadius:11,padding:"10px 13px",marginBottom:14,fontSize:12,color:P.red,fontWeight:700}}>⚠️ {t.lowBal}</div>}
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setModal(null)} style={{flex:1,padding:13,background:P.pale,border:"none",borderRadius:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",color:P.mid}}>{t.cancel}</button>
            <button onClick={doWd} style={{flex:2,padding:13,background:`linear-gradient(135deg,${P.gold},${P.goldD})`,color:"#fff",border:"none",borderRadius:14,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>{t.confirmWd}</button>
          </div>
        </div>
      </div>}

      {modal==="report"&&<div style={{position:"fixed",inset:0,background:"rgba(10,22,40,0.65)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}}>
        <div style={{background:"#fff",borderRadius:"30px 30px 0 0",padding:24,width:"100%",maxWidth:480,paddingBottom:34}}>
          <div style={{width:44,height:5,borderRadius:3,background:P.border,margin:"0 auto 22px"}}/>
          <div style={{fontWeight:900,fontSize:18,color:P.red,marginBottom:16}}>⚠️ {t.report}</div>
          <textarea style={{...INP,resize:"none",marginBottom:16,minHeight:100}} rows={4} value={repReason} onChange={e=>setRepReason(e.target.value)} placeholder={t.reasonPh}/>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setModal(null);setRepReason("")}} style={{flex:1,padding:13,background:P.pale,border:"none",borderRadius:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",color:P.mid}}>{t.cancel}</button>
            <button onClick={doReport} style={{flex:2,padding:13,background:`linear-gradient(135deg,${P.red},#991b1b)`,color:"#fff",border:"none",borderRadius:14,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>{t.sendRep}</button>
          </div>
        </div>
      </div>}

      {toast&&<div style={{position:"fixed",bottom:94,left:"50%",transform:"translateX(-50%)",background:toast.err?P.red:P.grn,color:"#fff",padding:"13px 24px",borderRadius:24,fontWeight:700,fontSize:13,zIndex:999,whiteSpace:"nowrap"}}>{toast.m}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
